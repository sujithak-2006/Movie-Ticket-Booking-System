<!DOCTYPE html>
<html>
<head>
    <title>Search Results</title>
</head>
<body>

<h1>Search Page Works!</h1>

<h3>Query: {{ query }}</h3>

<ul>
    {% for movie in movies %}
      <div class="movie-card">
         <img src="{{ movie.poster_url }}">
         <h3>{{ movie.movie_name }}</h3>
      </div>
    {% endfor %}
</ul>

</body>
</html>
