<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | Add New Movie</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: #081b29; color: white; padding: 50px 20px; display: flex; flex-direction: column; align-items: center; }
        h1 { color: #00ff88; margin-bottom: 30px; font-weight: 600; }
        .admin-box { width: 100%; max-width: 500px; background: #0c2438; border: 1px solid #1c354d; border-radius: 15px; padding: 30px; box-shadow: 0 8px 24px rgba(0,0,0,0.4); }
        .form-group { margin-bottom: 20px; display: flex; flex-direction: column; gap: 8px; text-align: left; }
        label { font-size: 14px; color: #cccccc; }
        input { width: 100%; padding: 12px; font-size: 16px; border-radius: 8px; border: 2px solid #1c354d; background: #112e42; color: white; outline: none; }
        input:focus { border-color: #00ff88; }
        .submit-btn { width: 100%; background: #00ff88; color: #081b29; border: none; padding: 14px; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; transition: 0.2s ease; margin-top: 10px; }
        .submit-btn:hover { background: #00cc6a; box-shadow: 0 0 15px rgba(0, 255, 136, 0.4); }
        .links-container { display: flex; gap: 20px; margin-top: 20px; }
        .nav-link { color: #cccccc; text-decoration: none; font-size: 14px; }
        .nav-link:hover { color: white; }
    </style>
</head>
<body>

    <h1>🎬 Add New Movie to Catalog</h1>

    <div class="admin-box">
        <form action="/admin/add_movie" method="POST">
            <div class="form-group">
                <label for="movie_name">Movie Name / Title</label>
                <input type="text" name="movie_name" id="movie_name" placeholder="e.g. Vidamuyarchi" required>
            </div>
            <div class="form-group">
                <label for="genre">Genre Class</label>
                <input type="text" name="genre" id="genre" placeholder="e.g. Thriller / Action" required>
            </div>
            <div class="form-group">
                <label for="language">Primary Language</label>
                <input type="text" name="language" id="language" placeholder="e.g. Tamil" required>
            </div>
            <div class="form-group">
                <label for="duration">Duration Length</label>
                <input type="text" name="duration" id="duration" placeholder="e.g. 2h 45m" required>
            </div>
            <div class="form-group">
                <label for="price">Standard Catalog Price (₹)</label>
                <input type="number" name="price" id="price" placeholder="e.g. 200" required>
            </div>
            <div class="form-group">
                <label for="poster_url">Poster Image Filename (In static/images/)</label>
                <input type="text" name="poster_url" id="poster_url" placeholder="e.g. vidamuyarchi.jpg" required>
            </div>

            <button type="submit" class="submit-btn">Insert New Movie Card</button>
        </form>
    </div>

    <div class="links-container">
        <a href="/admin/add_show" class="nav-link" style="color: #00ff88;">📅 Go to Schedule Timelines</a>
        <a href="/" class="nav-link">← Main Site</a>
    </div>

</body>
</html>
