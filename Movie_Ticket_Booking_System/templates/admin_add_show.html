<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Manage Timelines</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: #081b29;
            color: white;
            padding: 50px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: #00ff88;
            margin-bottom: 25px;
            font-weight: 600;
        }

        /* Nav container cleanly floating outside the form box panel */
        .admin-nav {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            width: 100%;
            max-width: 500px;
            justify-content: center;
        }

        .nav-btn {
            padding: 10px 20px;
            font-size: 14px;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 500;
            transition: 0.2s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav-btn.inactive {
            color: #cccccc;
            border: 1px solid #1c354d;
            background: #112e42;
        }

        .nav-btn.inactive:hover {
            color: white;
            border-color: #00ff88;
        }

        .nav-btn.active {
            color: #00ff88;
            border: 1px solid #00ff88;
            background: rgba(0, 255, 136, 0.1);
            font-weight: 600;
        }

        .admin-box {
            width: 100%;
            max-width: 500px;
            background: #0c2438;
            border: 1px solid #1c354d;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
        }

        .form-group {
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            text-align: left;
        }

        label {
            font-size: 14px;
            color: #cccccc;
        }

        select, input {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            border-radius: 8px;
            border: 2px solid #1c354d;
            background: #112e42;
            color: white;
            outline: none;
        }

        select:focus, input:focus {
            border-color: #00ff88;
        }

        .submit-btn {
            width: 100%;
            background: #00ff88;
            color: #081b29;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s ease;
            margin-top: 10px;
        }

        .submit-btn:hover {
            background: #00cc6a;
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.4);
        }

        .back-link {
            margin-top: 25px;
            color: #cccccc;
            text-decoration: none;
            font-size: 14px;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: white;
        }
    </style>
</head>
<body>

    <h1>🔧 Cinema Scheduler Admin Panel</h1>

    <div class="admin-nav">
        <a href="/admin/add_movie" class="nav-btn inactive">➕ Add New Movie</a>
        <a href="/admin/add_show" class="nav-btn active">📅 Schedule Show Times</a>
    </div>

    <div class="admin-box">
        <form action="/admin/add_show" method="POST">
            
            <div class="form-group">
                <label for="movie_id">Select Target Movie</label>
                <select name="movie_id" id="movie_id" required>
                    <option value="" disabled selected>-- Choose Catalog Entry --</option>
                    {% for movie in movies %}
                        <option value="{{ movie.movie_id }}">{{ movie.movie_name }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label for="show_date">Assign Play Date</label>
                <input type="date" name="show_date" id="show_date" required>
            </div>

            <div class="form-group">
                <label for="show_time">Assign Show Session Time</label>
                <select name="show_time" id="show_time" required>
                    <option value="10:00 AM">10:00 AM (Morning Show)</option>
                    <option value="1:30 PM">1:30 PM (Matinee)</option>
                    <option value="5:00 PM">5:00 PM (Evening Show)</option>
                    <option value="9:00 PM">9:00 PM (Night Show)</option>
                </select>
            </div>

            <div class="form-group">
                <label for="price">Ticket Rate Price (₹)</label>
                <input type="number" name="price" id="price" placeholder="e.g. 180" min="50" required>
            </div>

            <button type="submit" class="submit-btn">Publish Show Session</button>
        </form>
    </div>

    <a href="/" class="back-link">← Return to Main Site</a>

    <script>
        // Block choosing past scheduler dates automatically
        document.getElementById('show_date').min = new Date().toISOString().split('T')[0];
    </script>
</body>
</html>
